# ═══════════════════════════════════════════════════════════
#  TradeSage — Nginx Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════
#
#  Reverse proxy: 80/443 → 8000 (FastAPI/Uvicorn)
#  SSE support: proxy_buffering off, long read timeout
#  Gzip compression, rate limiting (100 req/min per IP)
#

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=tradesage_ratelimit:10m rate=100r/m;

upstream tradesage_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    server_name tradesagaai.duckdns.org;

    # Redirect HTTP → HTTPS (uncomment after Certbot setup)
    # return 301 https://$server_name$request_uri;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml;


    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Main Proxy ──
    location / {
        limit_req zone=tradesage_ratelimit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://tradesage_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # General timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # ── SSE Endpoint (special config) ──
    location /api/signals/live {
        proxy_pass http://tradesage_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CRITICAL for SSE: disable buffering
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Long timeout for SSE connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Static files (cache aggressively) ──
    location /static/ {
        proxy_pass http://tradesage_backend;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check (no rate limit) ──
    location /api/status {
        proxy_pass http://tradesage_backend;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tradesagaai.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tradesagaai.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# ── HTTPS Server Block (uncomment after Certbot setup) ──
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#
#     # ... (same location blocks as above) ...
# }


server {
    if ($host = tradesagaai.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name tradesagaai.duckdns.org;
    return 404; # managed by Certbot


}