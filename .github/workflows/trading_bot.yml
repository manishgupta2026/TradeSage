name: TradeSage Trading Bot

on:
  schedule:
    # Run at 09:25 AM IST (03:55 UTC) - 5 mins before market open
    - cron: '55 3 * * 1-5'
    # Run at 02:55 PM IST (09:25 UTC) - Before market close
    - cron: '25 9 * * 1-5'
  workflow_dispatch:  # Allow manual triggers

jobs:
  paper-trading:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Configure Git Authentication
      run: |
        git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Config
      run: |
        mkdir -p config
        echo '{
          "api_key": "${{ secrets.ANGEL_MARKET_KEY }}",
          "client_id": "${{ secrets.ANGEL_CLIENT_ID }}",
          "password": "${{ secrets.ANGEL_MPIN }}",
          "totp_token": "${{ secrets.ANGEL_TOTP_SECRET }}",
          "telegram_token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
          "telegram_chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}"
        }' > config/angel_config.json

    - name: Restore Paper Portfolio
      uses: actions/cache@v4
      with:
        path: |
          data/paper_portfolio.json
          data/angel_scrip_master.json
        key: paper-portfolio-${{ github.run_id }}
        restore-keys: |
          paper-portfolio-

    - name: Run Trading Bot (Paper Mode)
      env:
        PYTHONPATH: .
        TRADESAGE_MODE: paper
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        DAILY_LOSS_LIMIT: "2500"
      run: |
        python src/utils/run_workflow.py

    - name: Save Paper Portfolio
      if: always()
      uses: actions/cache@v4
      with:
        path: |
          data/paper_portfolio.json
          data/angel_scrip_master.json
        key: paper-portfolio-${{ github.run_id }}

    - name: Health Check Notification
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "
        import os, requests
        token = os.getenv('TELEGRAM_BOT_TOKEN')
        chat_id = os.getenv('TELEGRAM_CHAT_ID')
        if token and chat_id:
            url = f'https://api.telegram.org/bot{token}/sendMessage'
            requests.post(url, json={'chat_id': chat_id, 'text': '⚠️ TradeSage workflow FAILED! Check GitHub Actions.'})
        "
