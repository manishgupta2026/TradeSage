name: TradeSage Trading Bot Health Check

on:
  schedule:
    # Run at 09:25 AM IST (03:55 UTC) - 5 mins before market open
    - cron: '55 3 * * 1-5'
    # Run at 02:55 PM IST (09:25 UTC) - Before market close
    - cron: '25 9 * * 1-5'
  workflow_dispatch:  # Allow manual triggers

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
    - name: Check VPS Scanner Health
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_SSH_PASSWORD }}
        port: 22
        script: |
          echo "=========================================="
          echo "  TRADESAGE VPS HEALTH CHECK"
          echo "  $(date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          
          cd /root/TradeSage || exit 1
          
          # Check Docker containers
          echo "--- Docker Containers ---"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "Docker not available"
          
          # Check API health
          echo ""
          echo "--- API Health ---"
          curl -s http://localhost:8000/api/status 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "API not responding"
          
          # Check scanner logs (last 20 lines)
          echo ""
          echo "--- Scanner Logs (last 20) ---"
          docker logs tradesage-scanner --tail 20 2>/dev/null || tail -20 /root/TradeSage/logs/scanner.log 2>/dev/null || echo "No scanner logs found"
          
          # Check model file exists
          echo ""
          echo "--- Model Files ---"
          ls -la /root/TradeSage/models/*.pkl 2>/dev/null || echo "No model files found!"
          
          echo ""
          echo "--- Disk Usage ---"
          df -h / | tail -1
          
          echo ""
          echo "Health check complete."

    - name: Restart Scanner If Needed
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_SSH_PASSWORD }}
        port: 22
        script: |
          cd /root/TradeSage || exit 1
          
          # Check if scanner container is running
          SCANNER_STATUS=$(docker inspect -f '{{.State.Running}}' tradesage-scanner 2>/dev/null || echo "false")
          
          if [ "$SCANNER_STATUS" != "true" ]; then
            echo "⚠️ Scanner not running — restarting..."
            docker-compose up -d scanner 2>/dev/null || docker compose up -d scanner 2>/dev/null
            echo "Scanner restart triggered"
          else
            echo "✅ Scanner is running"
          fi
          
          # Check if API is healthy
          API_CHECK=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/status 2>/dev/null || echo "000")
          
          if [ "$API_CHECK" != "200" ]; then
            echo "⚠️ API not healthy (HTTP $API_CHECK) — restarting..."
            docker-compose up -d api 2>/dev/null || docker compose up -d api 2>/dev/null
          else
            echo "✅ API is healthy"
          fi

    - name: Notify on Failure
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python3 -c "
        import os, requests
        token = os.getenv('TELEGRAM_BOT_TOKEN')
        chat_id = os.getenv('TELEGRAM_CHAT_ID')
        if token and chat_id:
            url = f'https://api.telegram.org/bot{token}/sendMessage'
            requests.post(url, json={'chat_id': chat_id, 'text': '⚠️ TradeSage VPS health check FAILED! Services may be down.'})
        " 2>/dev/null || true
