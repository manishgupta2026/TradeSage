name: Daily Model Retraining MLOps

on:
  schedule:
    # Run at 5:00 PM IST (11:30 AM UTC) - 1.5 hours after Indian Market closes
    - cron: '30 11 * * 1-5'
  workflow_dispatch:  # Enable manual triggering from GitHub UI

jobs:
  retrain-on-vps:
    runs-on: ubuntu-latest

    steps:
    - name: Trigger VPS Retrain Pipeline
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_SSH_PASSWORD }}
        port: 22
        timeout: 90m
        command_timeout: 90m
        script: |
          echo "=========================================="
          echo "  TRADESAGE VPS RETRAIN — Triggered by GitHub Actions"
          echo "  $(date '+%Y-%m-%d %H:%M:%S IST')"
          echo "=========================================="
          
          cd /root/TradeSage || exit 1
          
          # Activate virtual environment if available
          if [ -f "venv/bin/activate" ]; then
            source venv/bin/activate
          fi
          
          # Run the VPS retrain pipeline
          # This fetches data via yfinance (cached on VPS), trains model,
          # evaluates AUC gate, and hot-swaps if it passes
          python scripts/train_vps.py 2>&1 | tail -100
          
          # Check exit code
          if [ $? -eq 0 ]; then
            echo "✅ Retrain pipeline completed successfully"
          else
            echo "❌ Retrain pipeline failed"
            exit 1
          fi
          
          # Restart the scanner service to pick up new model
          echo "Restarting scanner service..."
          docker restart tradesage-scanner 2>/dev/null || echo "Scanner container not found — using direct process"

    - name: Notify on Failure
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_SSH_PASSWORD }}
        port: 22
        script: |
          cd /root/TradeSage || exit 0
          
          # Activate venv
          if [ -f "venv/bin/activate" ]; then
            source venv/bin/activate
          fi
          
          # Send Telegram alert about failure
          python -c "
          import json, os, requests
          cfg_path = 'config/angel_config.json'
          token, chat_id = None, None
          if os.path.exists(cfg_path):
              with open(cfg_path) as f:
                  cfg = json.load(f)
              token = cfg.get('telegram_token')
              chat_id = cfg.get('telegram_chat_id')
          token = token or os.getenv('TELEGRAM_BOT_TOKEN')
          chat_id = chat_id or os.getenv('TELEGRAM_CHAT_ID')
          if token and chat_id:
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat_id, 'text': '🚨 GitHub Actions retrain pipeline FAILED! Check logs.'}
              )
          " 2>/dev/null || true
